# Training configuration
epochs: 200
lr: 0.01
weight_decay: 5e-4
optimizer: "adam"
scheduler: null
early_stopping:
  patience: 50
  min_delta: 1e-4
  monitor: "val_loss"
  mode: "min"

# Training settings
batch_size: null  # Full batch for graph data
val_split: 0.1
test_split: 0.1
shuffle: true

# Logging
log_interval: 20
save_best_only: true
save_last: true

# Optimizer configurations
optimizer_configs:
  adam:
    betas: [0.9, 0.999]
    eps: 1e-8
    amsgrad: false
  
  sgd:
    momentum: 0.9
    nesterov: true
  
  adamw:
    betas: [0.9, 0.999]
    eps: 1e-8
    weight_decay: 1e-2
