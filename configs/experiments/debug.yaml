# Debug experiment configuration
defaults:
  - override /model: gcn
  - override /training: default
  - override /data: cora

# Debug settings
experiment:
  name: "debug_experiment"
  seed: 42

# Model overrides
model:
  hidden_dims: [16]  # Small model for fast debugging
  dropout: 0.1

# Training overrides
training:
  epochs: 10  # Short training for debugging
  lr: 0.01
  log_interval: 1

# Data overrides
data:
  name: "Cora"
